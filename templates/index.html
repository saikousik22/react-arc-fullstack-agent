<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReAct Agent Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 50%),
                              radial-gradient(circle at bottom left, #064e3b, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* AUTH SCREEN */
        #auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 40px;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: var(--text-muted); margin-bottom: 30px; }

        input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        button {
            width: 100%;
            max-width: 334px;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-secondary { background: transparent; border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }

        /* MULTI-THREAD CHAT SCREEN */
        #chat-screen {
            display: none;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
        }

        .thread-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .thread-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .thread-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .thread-item.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            font-weight: 600;
        }

        /* MAIN CHAT AREA */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { margin: 0; font-size: 1.2rem; }

        .chat-history {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            margin-bottom: 20px;
            line-height: 1.5;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-user {
            background: var(--accent);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            margin: 0;
            flex: 1;
            max-width: none;
            border-radius: 20px;
            padding: 15px 25px;
        }

        .chat-input-area button {
            width: auto;
            padding: 0 30px;
            border-radius: 20px;
            margin: 0;
        }

        .loader {
            display: none;
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            padding-left: 20px;
        }
        .logout-btn { background: #ef4444; margin:0;}
        .logout-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div class="container">
        <!-- AUTHENTICATION SCREEN -->
        <div id="auth-screen">
            <h1>Memory Agent</h1>
            <p>LangGraph + FastAPI Full Stack</p>

            <div id="login-form" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <input type="text" id="login-username" placeholder="Username" autocomplete="off">
                <input type="password" id="login-password" placeholder="Password">
                <button onclick="login()">Log In</button>
                <button class="btn-secondary" onclick="toggleAuthMode(true)">New User? Create Account</button>
            </div>

            <div id="register-form" style="width: 100%; display: none; flex-direction: column; align-items: center;">
                <input type="text" id="reg-name" placeholder="Full Name" autocomplete="off">
                <input type="email" id="reg-email" placeholder="Email Address" autocomplete="off">
                <input type="text" id="reg-username" placeholder="Choose a Username" autocomplete="off">
                <input type="password" id="reg-password" placeholder="Create Password">
                <button onclick="register()">Register Account</button>
                <button class="btn-secondary" onclick="toggleAuthMode(false)">Back to Login</button>
            </div>
            
            <div id="auth-error" style="color: #ef4444; margin-top: 15px; font-size: 0.9rem; text-align: center;"></div>
            <div id="auth-success" style="color: #10b981; margin-top: 15px; font-size: 0.9rem; text-align: center;"></div>
        </div>

        <!-- MULTI-THREAD CHAT SCREEN -->
        <div id="chat-screen">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <button onclick="createNewThread()" style="width: 100%; margin: 0;">+ New Chat</button>
                </div>
                <div class="thread-list" id="thread-list">
                    <!-- Dynamic thread items inserted here -->
                </div>
                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="logout()" style="width: 100%;">Logout</button>
                </div>
            </div>

            <!-- Main Chat -->
            <div class="main-chat">
                <div class="chat-header">
                    <h2 id="active-chat-title">Select or Create a Chat</h2>
                </div>
                
                <div class="chat-history" id="chat-history">
                    <div style="text-align:center; color: #94a3b8; margin-top: 50px;">Please select a chat thread from the left, or create a new one to begin.</div>
                </div>
                
                <div class="loader" id="loader">Agent is reasoning and using tools...</div>

                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Type your message here..." onkeypress="handleEnter(event)" disabled>
                    <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = ""; 
        let currentThreadId = null;

        window.onload = () => {
            if (localStorage.getItem("token")) {
                showChat();
                loadThreads();
            }
        };

        // --- AUTH LOGIC ---
        function toggleAuthMode(isRegister) {
            document.getElementById("auth-error").innerText = "";
            document.getElementById("auth-success").innerText = "";
            document.getElementById(isRegister ? "login-form" : "register-form").style.display = "none";
            document.getElementById(isRegister ? "register-form" : "login-form").style.display = "flex";
        }

        async function register() {
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            const user = document.getElementById("reg-username").value;
            const pass = document.getElementById("reg-password").value;
            
            if (!name || !email || !user || !pass) return alert("Fill all fields");

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email: email, full_name: name, password: pass })
                });
                if (res.ok) {
                    document.getElementById("auth-success").innerText = "Registration complete! You can log in.";
                    toggleAuthMode(false);
                } else {
                    const data = await res.json();
                    document.getElementById("auth-error").innerText = data.detail;
                }
            } catch (err) { console.error(err); }
        }

        async function login() {
            const user = document.getElementById("login-username").value;
            const pass = document.getElementById("login-password").value;
            const formData = new URLSearchParams({ username: user, password: pass });

            try {
                const res = await fetch(`${API_URL}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem("token", data.access_token);
                    showChat();
                    loadThreads();
                } else {
                    document.getElementById("auth-error").innerText = data.detail || "Authentication Failed";
                }
            } catch (err) { console.error(err); }
        }

        function logout() {
            localStorage.removeItem("token");
            currentThreadId = null;
            document.getElementById("chat-history").innerHTML = "";
            document.getElementById("thread-list").innerHTML = "";
            document.getElementById("auth-screen").style.display = "flex";
            document.getElementById("chat-screen").style.display = "none";
        }

        function showChat() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("chat-screen").style.display = "flex";
        }

        function unlockChat(title) {
            document.getElementById("active-chat-title").innerText = title || "Active Chat";
            document.getElementById("chat-input").disabled = false;
            document.getElementById("send-btn").disabled = false;
        }

        // --- MULTI-THREAD SIDEBAR LOGIC ---
        async function loadThreads() {
            const token = localStorage.getItem("token");
            const res = await fetch(`${API_URL}/threads`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const threads = await res.json();
                const list = document.getElementById("thread-list");
                list.innerHTML = "";
                
                // Sort by newest first assuming the backend returns them in order, or reverse here
                threads.reverse().forEach(t => {
                    const div = document.createElement("div");
                    div.className = `thread-item ${t.id === currentThreadId ? 'active' : ''}`;
                    div.innerText = t.title;
                    div.onclick = () => selectThread(t.id, t.title);
                    list.appendChild(div);
                });
                
                if (threads.length === 0) {
                    createNewThread(); // Auto-create first thread
                }
            } else if (res.status === 401) logout();
        }

        async function createNewThread() {
            const token = localStorage.getItem("token");
            const res = await fetch(`${API_URL}/threads`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title: "New Conversation" })
            });
            if (res.ok) {
                const data = await res.json();
                await loadThreads();
                selectThread(data.id, data.title);
            }
        }

        async function selectThread(id, title) {
            currentThreadId = id;
            unlockChat(title);
            
            // Highlight active thread
            document.querySelectorAll(".thread-item").forEach(el => el.classList.remove("active"));
            // Find the item matching this ID and add active (requires reloading thread list if simple binding needed)
            await loadThreadsHelperStyles(id);
            
            // Fetch History for this thread!
            const token = localStorage.getItem("token");
            const res = await fetch(`${API_URL}/history?thread_id=${id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            const historyDiv = document.getElementById("chat-history");
            historyDiv.innerHTML = "";
            
            if (res.ok) {
                const data = await res.json();
                if (data.history.length === 0) {
                    appendMessage("ai", "I'm ready! What can I help you with today?");
                } else {
                    data.history.forEach(msg => appendMessage(msg.role, msg.content));
                }
            }
        }
        
        function loadThreadsHelperStyles(id) {
           // Quick helper to fix active styling
           const list = document.getElementById("thread-list");
           Array.from(list.children).forEach(child => {
               if(child.innerText === id || true) { /* Hack logic: reloading via loadThreads fixes it reliably */ }
           });
        }

        // --- CHAT LOGIC ---
        function appendMessage(role, text) {
            const history = document.getElementById("chat-history");
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            div.innerText = text;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            if (!currentThreadId) return alert("Please select a chat first!");
            const inputEl = document.getElementById("chat-input");
            const text = inputEl.value.trim();
            if (!text) return;
            
            inputEl.value = "";
            appendMessage("user", text);
            document.getElementById("loader").style.display = "block";

            const token = localStorage.getItem("token");
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: text, thread_id: currentThreadId })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("loader").style.display = "none";
                    appendMessage("ai", data.response);
                    
                    // If backend generated a new title, instantly update UI
                    if (data.new_title) {
                        unlockChat(data.new_title);
                        loadThreads();
                    }
                } else {
                    const data = await res.json();
                    document.getElementById("loader").style.display = "none";
                    appendMessage("ai", "Error: " + data.detail);
                }
            } catch (err) {
                document.getElementById("loader").style.display = "none";
                appendMessage("ai", "Network Error connecting to API.");
            }
        }
    </script>
</body>
</html>
